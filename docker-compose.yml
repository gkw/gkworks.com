services:
  gkworks:
    build: .
    image: gkworks-site:latest
    ports:
      - "8099:8099"
    environment:
      FLASK_SECRET_KEY: "change-this-secret"
      CONTACT_SUBMISSIONS_PATH: "/app/instance/contact_submissions.jsonl"
      CONTACT_API_NOTIFICATIONS_PATH: "/app/instance/contact_api_notifications.jsonl"
      CONTACT_NOTIFY_EMAIL: "gen@gkworks.com"
      CONTACT_FROM_EMAIL: "gen@gkworks.com"
      CONTACT_NOTIFY_API_TOKEN: "dev-change-me"
    volumes:
      - gkworks_instance:/app/instance
    restart: unless-stopped

volumes:
  gkworks_instance:
